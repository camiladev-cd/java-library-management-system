# ── Datasource ────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:library_db}
spring.datasource.username=${POSTGRES_USER:library_user}
spring.datasource.password=${POSTGRES_PASSWORD:library_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:default_secret_change_in_production_min_32_chars!!}
app.jwt.expiration=86400000

# ── Swagger / OpenAPI ─────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ── Server ────────────────────────────────────────────────────────
server.port=8080