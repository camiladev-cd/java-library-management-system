# ─── Datasource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:library_db}
spring.datasource.username=${POSTGRES_USER:library_user}
spring.datasource.password=${POSTGRES_PASSWORD:library_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:9xPJvotYD/AnBhL7SeWEwjDf9cfI6dDvKtpfScbd4IHaYeVP/9/SlLabMt+vDcDucignu0puqsgXDu8cdfaXIw==}
app.jwt.expiration=86400000

# ─── Swagger UI ───────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Logs ─────────────────────────────────────────────────────────────────────
logging.level.com.librarymanagement=DEBUG
logging.level.org.hibernate.SQL=DEBUG

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never