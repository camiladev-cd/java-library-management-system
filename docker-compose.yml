version: '3.8'

services:

  # ─────────────────────────────────────────
  # PostgreSQL 15
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: library_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-library_db}
      POSTGRES_USER: ${POSTGRES_USER:-library_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-library_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - library_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-library_user} -d ${POSTGRES_DB:-library_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  # pgAdmin 4
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: library_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@library.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - library_network
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Spring Boot App (perfil prod)
  # Comentado para desarrollo local.
  # Descomenta cuando tengas el Dockerfile listo.
  # ─────────────────────────────────────────
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: library_app
  #   restart: unless-stopped
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-library_db}
  #     SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-library_user}
  #     SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-library_pass}
  #     JWT_SECRET: ${JWT_SECRET}
  #     SPRING_PROFILES_ACTIVE: prod
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - library_network
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  postgres_data:
    name: library_postgres_data
  pgadmin_data:
    name: library_pgadmin_data

networks:
  library_network:
    name: library_network
    driver: bridge